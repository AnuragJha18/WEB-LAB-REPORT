<!DOCTYPE html>
<html>
<head>
    <title>jQuery Image Gallery</title>
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

    <style>
        #mainImage {
            width: 400px;
            height: 250px;
            border: 2px solid black;
            display: block;
            margin-bottom: 10px;
        }

        .thumb {
            width: 100px;
            height: 70px;
            margin: 5px;
            cursor: pointer;
            border: 2px solid gray;
        }

        .thumb:hover {
            border-color: blue;
        }
    </style>
</head>
<body>

<h2>Image Gallery</h2>

<img id="mainImage" src="https://images.unsplash.com/photo-1644088379091-d574269d422f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8dGVjaHxlbnwwfHwwfHx8MA%3D%3D">

<br>

<img class="thumb" src="https://plus.unsplash.com/premium_photo-1661963212517-830bbb7d76fc?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8dGVjaHxlbnwwfHwwfHx8MA%3D%3D">
<img class="thumb" src="https://images.unsplash.com/photo-1644088379091-d574269d422f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8dGVjaHxlbnwwfHwwfHx8MA%3D%3D">
<img class="thumb" src="https://plus.unsplash.com/premium_photo-1661963212517-830bbb7d76fc?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8NXx8dGVjaHxlbnwwfHwwfHx8MA%3D%3D">
<img class="thumb" src="https://images.unsplash.com/photo-1644088379091-d574269d422f?w=600&auto=format&fit=crop&q=60&ixlib=rb-4.1.0&ixid=M3wxMjA3fDB8MHxzZWFyY2h8Nnx8dGVjaHxlbnwwfHwwfHx8MA%3D%3D">

<script>
$(document).ready(function(){

    $(".thumb").click(function(){
        let newSrc = $(this).attr("src");
        $("#mainImage").attr("src", newSrc);
    });

});
</script>

</body>
</html>
