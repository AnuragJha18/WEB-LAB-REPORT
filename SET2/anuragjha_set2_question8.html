<!DOCTYPE html>
<html>
<head>
    <title>Countries Table</title>
    <style>
        table {
            border-collapse: collapse;
            width: 80%;
            margin: 20px auto;
        }
        td {
            border: 1px solid black;
            padding: 10px;
            text-align: center;
        }
    </style>
</head>
<body>

<h2 align="center">50 Countries (6 per Row)</h2>

<table id="countryTable"></table>

<script>
    const countries = [
        "Nepal", "India", "China", "Japan", "USA", "Canada",
        "Brazil", "Argentina", "UK", "France", "Germany", "Italy",
        "Spain", "Portugal", "Russia", "Australia", "New Zealand", "South Korea",
        "North Korea", "Thailand", "Malaysia", "Singapore", "Indonesia", "Pakistan",
        "Bangladesh", "Sri Lanka", "Bhutan", "Maldives", "Afghanistan", "Iran",
        "Iraq", "Saudi Arabia", "UAE", "Qatar", "Kuwait", "Oman",
        "Turkey", "Egypt", "South Africa", "Nigeria", "Kenya", "Morocco",
        "Mexico", "Chile", "Peru", "Colombia", "Venezuela", "Belgium",
        "Netherlands", "Sweden"
    ];

    const table = document.getElementById("countryTable");

    for (let i = 0; i < countries.length; i += 6) {
        let row = table.insertRow();

        for (let j = i; j < i + 6 && j < countries.length; j++) {
            let cell = row.insertCell();
            cell.innerHTML = countries[j];
        }
    }
</script>

</body>
</html>
