<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .card {
            position: relative;
            width: 300px;
            height: 400px;
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
        }

        .card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(0, 0, 0, 0.6);
            overflow: hidden;
            width: 100%;
            height: 0;
            transition: .5s ease;
            display: flex;
            align-items: flex-end;
        }
        .card:hover .overlay {
            height: 40%;
        }

        .content {
            color: white;
            padding: 20px;
            width: 100%;
        }

        .content h3 {
            margin: 0 0 5px 0;
            font-size: 1.2rem;
        }

        .content p {
            font-size: 0.9rem;
            margin-bottom: 15px;
        }

        .content button {
            background-color: white;
            border: none;
            padding: 8px 15px;
            border-radius: 20px;
            font-weight: bold;
            cursor: pointer;
        }
    </style>
</head>

<body>

    <div class="card">
        <img src="https://i.pinimg.com/736x/fb/b7/24/fbb7242470f27c41d3d39d90e641d4dd.jpg" alt="Nature Tree">
        <div class="overlay">
            <div class="content">
                <h3>Card Title</h3>
                <p>This is a sample card description</p>
                <button>Read More</button>
            </div>
        </div>
    </div>

</body>

</html>
