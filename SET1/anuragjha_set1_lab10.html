<!DOCTYPE html>
<html>
<head>
    <title>Navigation Bar</title>
    <style>
        nav{
            border: 1px solid yellowgreen;
            background-color: yellow;
            padding: 2px;
            display: flex;
        }
        .links{
            padding: 10px;
            text-decoration: none;
            color: purple;
        }

        .links:hover{
            background-color: blue;
            color: white;
        }

    </style>
</head>

<body>

    <header>
       <nav>
         <a href="#" class="links">Home</a><hr>
        <a href="#" class="links">About</a><hr>
        <a href="#" class="links">Services</a><hr>
        <a href="#" class="links">Gallery</a><hr>
        <a href="#" class="links">Contact</a>
       </nav>
    </header>

</body>

</html>
