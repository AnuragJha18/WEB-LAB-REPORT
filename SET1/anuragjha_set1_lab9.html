<!DOCTYPE html>
<html>
<head>
    <title>Table Layout</title>
    <style>
        table,td{
            text-align: center;
            border-collapse: collapse;
            margin: auto;
        }
    </style>

</head>
<body>
    <table border="1">
        <thead>
        <tr>
            <th colspan="6">Time Table</th>
        </tr>
        </thead>

        <tbody>
            <tr>
                <td rowspan="6">Hours</td>
                <td>Mon</td>
                <td>Tue</td>
                <td>Wed</td>
                <td>Thu</td>
                <td>Fri</td>
            </tr>

            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>Math</td>
                <td>Science</td>
                <td>Arts</td>
            </tr>

             <tr>
                <td>Math</td>
                <td>Science</td>
                <td>Math</td>
                <td>Science</td>
                <td>Arts</td>
            </tr>

            <tr>
                <td colspan="5">Lunch</td>
            </tr>

            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>Math</td>
                <td rowspan="2" colspan="2">Project</td>
            </tr>

            <tr>
                <td>Math</td>
                <td>Science</td>
                <td>Math</td>
            </tr>
        </tbody>
    </table>
    
</body>
</html>
